<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</head>

<body onload="loadWarga()">

<div class="container">

<h2>Tambah Warga</h2>

<div class="card">
<h2>Input Pembayaran</h2>

<div class="card">

<input id="namaBayar" placeholder="Nama Warga">

<select id="bulan">

<option>Januari</option>
<option>Februari</option>
<option>Maret</option>
<option>April</option>
<option>Mei</option>
<option>Juni</option>
<option>Juli</option>
<option>Agustus</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Desember</option>

</select>

<input id="jumlah" placeholder="Jumlah Iuran">

<button onclick="bayarIuran()">

Simpan Pembayaran

</button>

</div>
<input id="nama" placeholder="Nama">
<input id="alamat" placeholder="Alamat">
<input id="kontak" placeholder="Kontak">

<button onclick="tambahWarga()">Simpan</button>

</div>


<h2>Daftar Warga</h2>

<div class="card">

<table>

<tr>

<td>Nama</td>
<td>Alamat</td>
<td>Kontak</td>

</tr>

<tbody id="dataWarga"></tbody>

</table>

</div>

</div>

</body>
</html>
