<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f2f5f9;
}

header{
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
padding:25px;
font-size:22px;
font-weight:600;
text-align:center;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:15px;
padding:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
font-size:18px;
}

.icon{
font-size:35px;
margin-bottom:10px;
}

.warga{color:#6f42c1}
.iuran{color:#17a2b8}
.kas{color:#ff9800}
.bayar{color:#28a745}
.edit{color:#dc3545}

@media(max-width:600px){
.menu{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<header>APLIKASI RT - ADMIN</header>

<div class="menu">

<div class="card">
<div class="icon warga">👨‍👩‍👧‍👦</div>
DATA WARGA
</div>

<div class="card">
<div class="icon iuran">💰</div>
IURAN BULANAN
</div>

<div class="card">
<div class="icon kas">📊</div>
KAS RT
</div>

<div class="card">
<div class="icon bayar">🧾</div>
INPUT PEMBAYARAN
</div>

<div class="card">
<div class="icon edit">✏️</div>
TAMBAH / EDIT DATA
</div>

</div>

</body>
</html>a
