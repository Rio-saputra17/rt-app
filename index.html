<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aplikasi RT</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:18px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
font-size:18px;
margin-top:10px;
border:none;
border-radius:10px;
color:white;
}

.warga{
background:#28a745;
}

.admin{
background:#007bff;
}

</style>

</head>

<body>

<div class="card">

<h2>APLIKASI RT</h2>

<input type="password" id="pass" placeholder="Masukkan Password">

<button class="warga" onclick="loginWarga()">LOGIN WARGA</button>

<button class="admin" onclick="loginAdmin()">LOGIN ADMIN</button>

<p id="status"></p>

</div>

<script>

function loginWarga(){

let p=document.getElementById("pass").value

if(p==="RT03"){

window.location="warga.html"

}else{

document.getElementById("status").innerText="Password salah"

}

}

function loginAdmin(){

let p=document.getElementById("pass").value

if(p==="RTKU"){

window.location="admin.html"

}else{

document.getElementById("status").innerText="Password salah"

}

}

</script>

</body>
</html>
