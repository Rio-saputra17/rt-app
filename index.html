<html>
<head>

<title>Aplikasi RT</title>

<body>

<div class="login">

<h2>Aplikasi RT</h2>

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let p=document.getElementById("pass").value

if(p=="RT03"){

location="warga.html"

}

else if(p=="RTKU"){

location="admin.html"

}

else{

alert("Password salah")

}

}

</script>
