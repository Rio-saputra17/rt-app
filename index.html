<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RT APP</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>


<body>

<header class="topbar">

<h1>RT APP</h1>

</header>



<div id="loginPage">

<div class="card">

<h2>Login</h2>

<button onclick="login('warga')">Login Warga</button>
<button onclick="login('admin')">Login Admin</button>

</div>

</div>



<div id="app" style="display:none">


<section id="dashboard">

<div class="grid">

<div class="card">
<p>Total Warga</p>
<h2 id="statWarga">0</h2>
</div>

<div class="card">
<p>Saldo Kas</p>
<h2 id="statKas">0</h2>
</div>

</div>

<canvas id="chartKas"></canvas>

</section>



<section id="warga" class="page hide">

<div class="card">

<h3>Tambah Warga</h3>

<input id="namaWarga" placeholder="Nama Warga">
<input id="alamatWarga" placeholder="Alamat">
<input id="kontakWarga" placeholder="Kontak">

<button onclick="tambahWarga()">Simpan</button>

</div>


<div class="card">

<h3>Daftar Warga</h3>

<input id="searchWarga" placeholder="Cari warga..." onkeyup="searchWarga()">

<table>

<tr>
<th>Nama</th>
<th>Alamat</th>
<th>Kontak</th>
</tr>

<tbody id="tableWarga"></tbody>

</table>

</div>

</section>



<section id="iuran" class="page hide">

<div class="card">

<h3>Input Pembayaran</h3>

<input id="namaBayar" placeholder="Nama Warga">

<select id="bulan">

<option>Januari</option>
<option>Februari</option>
<option>Maret</option>
<option>April</option>
<option>Mei</option>
<option>Juni</option>
<option>Juli</option>
<option>Agustus</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Desember</option>

</select>

<input id="jumlahBayar" placeholder="Jumlah Iuran">

<button onclick="bayarIuran()">Simpan Pembayaran</button>

</div>


<div class="card">

<h3>Status Iuran</h3>

<table>

<tr>
<th>Nama</th>
<th>Bulan</th>
<th>Jumlah</th>
</tr>

<tbody id="tableIuran"></tbody>

</table>

</div>

</section>



<section id="kas" class="page hide">

<div class="card">

<h3>Kas RT</h3>

<table>

<tr>
<th>Keterangan</th>
<th>Masuk</th>
<th>Keluar</th>
</tr>

<tbody id="tableKas"></tbody>

</table>

</div>

</section>



<nav class="bottomNav">

<button onclick="openPage('dashboard')">🏠</button>
<button onclick="openPage('warga')">👨‍👩‍👧</button>
<button onclick="openPage('iuran')">💰</button>
<button onclick="openPage('kas')">📊</button>
<button onclick="logout()">🚪</button>

</nav>


</div>


<script src="app.js"></script>

</body>

</html>
