<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RT APP</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>RT APP</h1>

</header>


<!-- DASHBOARD -->

<section id="dashboard">

<div class="logo">
🏘️
</div>

<h2>Dashboard RT</h2>

<div class="menuGrid">

<button onclick="openPage('warga')">
👨‍👩‍👧
<p>Data Warga</p>
</button>

<button onclick="openPage('iuran')">
💰
<p>Input Iuran</p>
</button>

<button onclick="openPage('kas')">
📊
<p>Kas RT</p>
</button>

</div>

</section>



<!-- WARGA -->

<section id="warga" class="hide">

<h2>Data Warga</h2>

<div class="card">

<input id="namaWarga" placeholder="Nama">
<input id="alamatWarga" placeholder="Alamat">
<input id="kontakWarga" placeholder="Kontak">

<button>Simpan</button>

</div>

<button onclick="openPage('dashboard')" class="backBtn">
⬅ Kembali
</button>

</section>



<!-- IURAN -->

<section id="iuran" class="hide">

<h2>Input Iuran</h2>

<div class="card">

<input placeholder="Nama Warga">

<select>

<option>Januari</option>
<option>Februari</option>
<option>Maret</option>
<option>April</option>
<option>Mei</option>
<option>Juni</option>
<option>Juli</option>
<option>Agustus</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Desember</option>

</select>

<input placeholder="Jumlah Iuran">

<button>Simpan Pembayaran</button>

</div>

<button onclick="openPage('dashboard')" class="backBtn">
⬅ Kembali
</button>

</section>



<!-- KAS -->

<section id="kas" class="hide">

<h2>Kas RT</h2>

<div class="card">

<p>Data kas masuk dan keluar nanti tampil di sini</p>

</div>

<button onclick="openPage('dashboard')" class="backBtn">
⬅ Kembali
</button>

</section>



<script src="app.js"></script>

</body>
</html>
