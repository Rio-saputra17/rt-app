<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RT APP</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>RT APP</h1>

</header>


<!-- DASHBOARD -->

<section id="dashboard">

<div class="logo">
🏘️
</div>

<h2>Dashboard RT</h2>

<div class="menu">

<button onclick="openPage('warga')">
👨‍👩‍👧
<p>Data Warga</p>
</button>

<button onclick="openPage('iuran')">
💰
<p>Input Iuran</p>
</button>

<button onclick="openPage('kas')">
📊
<p>Kas RT</p>
</button>

</div>

</section>



<!-- WARGA -->

<section id="warga" class="page">

<h2>Data Warga</h2>

<div class="card">

<input placeholder="Nama">
<input placeholder="Alamat">
<input placeholder="Kontak">

<button>Simpan</button>

</div>

<button class="back" onclick="openPage('dashboard')">
⬅ Kembali
</button>

</section>



<!-- IURAN -->

<section id="iuran" class="page">

<h2>Input Pembayaran</h2>

<div class="card">

<input placeholder="Nama Warga">

<select>

<option>Januari</option>
<option>Februari</option>
<option>Maret</option>
<option>April</option>
<option>Mei</option>
<option>Juni</option>
<option>Juli</option>
<option>Agustus</option>
<option>September</option>
<option>Oktober</option>
<option>November</option>
<option>Desember</option>

</select>

<input placeholder="Jumlah Iuran">

<button>Simpan Pembayaran</button>

</div>

<button class="back" onclick="openPage('dashboard')">
⬅ Kembali
</button>

</section>



<!-- KAS -->

<section id="kas" class="page">

<h2>Kas RT</h2>

<div class="card">

<p>Data kas akan muncul di sini</p>

</div>

<button class="back" onclick="openPage('dashboard')">
⬅ Kembali
</button>

</section>



<script src="app.js"></script>

</body>
</html>
